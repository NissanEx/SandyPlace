<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya – Sandy Place</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght=0,400;0,600;0,700;1,400&family=Inter:wght=300;400;500;600;700&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --gray-pill: #e1e1e1;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ---- Sticky Header Bar ---- */
        .header-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            width: 100%;
            border-bottom: 1px solid #f1f1f5;
            transition: all var(--transition-speed);
        }

        .logo {
            font-family: 'Lora', serif;
            font-size: 36px;
            line-height: 0.8;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            user-select: none;
            text-decoration: none;
        }
        .logo .light { font-weight: 300; color: #8c8c8c; }
        .logo .bold  { font-weight: 700; color: #000; margin-left: 45px; margin-top: -6px; }

        /* ---- Main Layout Container ---- */
        .profile-container {
            flex-grow: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 40px 80px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ---- Title Row Desktop Alignment ---- */
        .profile-title-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: -55px; 
            padding-left: 300px; 
            position: relative;
            z-index: 30; 
            transition: padding-left var(--transition-speed) ease;
        }

        @media (max-width: 768px) {
            .profile-title-row {
                padding-left: 0;
                margin-bottom: 20px;
                justify-content: center;
            }
        }

        /* ---- Premium Profile Dark Card ---- */
        .profile-card {
            background-color: #000000;
            border-radius: 28px;
            color: #ffffff;
            padding: 55px 55px 55px 300px; 
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            min-height: 320px;
            display: flex;
            align-items: center;
            transition: all var(--transition-speed) ease;
            margin-top: 90px; 
        }

        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                padding: 160px 24px 40px 24px;
                text-align: center;
                margin-top: 100px;
                min-height: auto;
            }
        }

        /* ---- Avatar Placement ---- */
        .profile-avatar-wrapper {
            position: absolute;
            left: 45px; 
            top: -85px; 
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background-color: #1a1a1a;
            border: 4px solid #000;
        }

        @media (max-width: 768px) {
            .profile-avatar-wrapper {
                left: 50%;
                transform: translateX(-50%);
                top: -110px;
                width: 180px;
                height: 180px;
            }
        }

        .profile-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            cursor: pointer;
            border-radius: 50%;
            gap: 4px;
        }

        .profile-avatar-wrapper:hover .avatar-hover-overlay {
            opacity: 1;
        }

        .avatar-hover-overlay span {
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
        }

        /* ---- Info Typography ---- */
        .info-label {
            font-family: 'Lora', serif;
            font-size: 18px;
            color: #a3a3a3;
            margin-bottom: 6px;
            display: block;
        }

        .info-value-name {
            font-family: 'Lora', serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .info-value-text {
            font-size: 16px;
            color: #ffffff;
            line-height: 1.6;
        }

        .info-value-italic {
            font-family: 'Lora', serif;
            font-size: 16px;
            font-style: italic;
            color: #ffffff;
            line-height: 1.6;
        }

        .btn-ganti {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 32px;
            border-radius: 9999px;
            font-family: 'Lora', serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-ganti:hover {
            transform: scale(1.05);
            background-color: #f3f3f3;
        }

        .btn-keluar-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 35px;
        }

        .btn-keluar {
            background-color: #7f0505; 
            color: #ffffff;
            border: none;
            padding: 12px 48px;
            border-radius: 12px;
            font-family: 'Lora', serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 15px rgba(127, 5, 5, 0.2);
        }

        .btn-keluar:hover {
            transform: scale(1.05);
            background-color: #600404;
        }

        /* ---- Tabs Section ---- */
        .tabs-section {
            margin-top: 80px;
            background-color: #f9f9f9;
            border-radius: 28px;
            padding: 60px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (max-width: 768px) {
            .tabs-section {
                padding: 30px 20px;
                border-radius: 20px;
            }
        }

        .tabs-header {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .tabs-header {
                gap: 16px;
                overflow-x: auto;
                padding-bottom: 8px;
            }
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 600;
            color: #a0a0a0;
            cursor: pointer;
            transition: color 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -1px;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #000;
            border-bottom-color: #000;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .product-card-item {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 16px;
        }

        .product-name {
            font-weight: 600;
            font-size: 14px;
            color: #000;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 12px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }

        .btn-small:hover {
            background: #f5f5f5;
        }

        /* Order Cards */
        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .toast-notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #000;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            border-left: 4px solid #fff;
            display: none;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            z-index: 1000;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-screen.hidden {
            display: none;
        }

        .loading-spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
    </div>

    <!-- STICKY TOP HEADER -->
    <div class="header-bar">
        <a href="index.html" class="logo">
            <span class="light">sandy</span>
            <span class="bold">place</span>
        </a>
    </div>

    <div class="profile-container">
        <div class="profile-title-row">
            <div class="info-label">Profil</div>
        </div>

        <div class="profile-card">
            <!-- Banner overlay di atas kartu -->
            <div id="profileBanner" style="position:absolute;top:0;left:0;right:0;height:90px;border-radius:28px 28px 0 0;background-color:#1a1a1a;opacity:0.4;pointer-events:none;z-index:0;"></div>
            
            <div class="profile-avatar-wrapper">
                <img id="profileAvatar" src="https://placehold.co/220x220" class="profile-avatar-img">
                <div class="avatar-hover-overlay" onclick="editAvatarPrompt()">
                    <span>Ubah Foto</span>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row justify-between items-start md:items-center gap-8 w-full" style="position:relative;z-index:1;">
                <div>
                    <span class="info-label">nama</span>
                    <h1 class="info-value-name" id="profileName">Loading...</h1>
                    
                    <div class="mt-3">
                        <span class="text-xs text-zinc-400 font-semibold tracking-wider uppercase block mb-1">pesan saya</span>
                        <p class="info-value-italic" id="profileBio">Sedang dimuat...</p>
                    </div>

                    <!-- Info kontak dari kolom DB: email, phone, address -->
                    <div class="mt-4 space-y-1.5">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-zinc-400 uppercase font-bold tracking-wider w-16">Email</span>
                            <span class="text-sm text-zinc-200" id="profileEmail">-</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-zinc-400 uppercase font-bold tracking-wider w-16">Telepon</span>
                            <span class="text-sm text-zinc-200" id="profilePhone">-</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-zinc-400 uppercase font-bold tracking-wider w-16">Alamat</span>
                            <span class="text-sm text-zinc-200" id="profileAddress">-</span>
                        </div>
                    </div>

                    <div class="mt-5">
                        <button class="btn-ganti" onclick="editProfilModal()">Edit Detail</button>
                    </div>
                </div>

                <div class="bg-zinc-900/60 border border-zinc-800 p-6 rounded-2xl min-w-[200px] text-center md:text-left">
                    <span class="text-[10px] text-zinc-500 font-extrabold uppercase tracking-widest block mb-3">Ikuti (Follow Up)</span>
                    <div class="flex items-center justify-around md:justify-start md:gap-8 gap-4">
                        <div>
                            <span class="block text-2xl font-bold font-serif text-white" id="statFollowers">0</span>
                            <span class="block text-[10px] text-zinc-500 uppercase font-medium mt-0.5">Pengikut</span>
                        </div>
                        <div class="h-8 w-[1px] bg-zinc-800"></div>
                        <div>
                            <span class="block text-2xl font-bold font-serif text-white" id="statFollowing">0</span>
                            <span class="block text-[10px] text-zinc-500 uppercase font-medium mt-0.5">Mengikuti</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs-section">
            <div class="tabs-header">
                <button id="btnTabProducts" class="tab-btn active" onclick="pindahTabToko('products')">
                    Toko Saya
                </button>
                <button id="btnTabOrders" class="tab-btn" onclick="pindahTabToko('orders')">
                    Pesanan Masuk
                    <span id="ordersBadge" class="badge hidden" style="background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 4px;">0</span>
                </button>
                <button id="btnTabMyOrders" class="tab-btn" onclick="pindahTabToko('my-orders')">
                    Pesanan Saya
                    <span id="myOrdersBadge" class="badge hidden" style="background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left: 4px;">0</span>
                </button>
            </div>

            <!-- Tab: Toko Saya -->
            <div id="tabContentProducts" class="tab-panel active">
                <div class="mb-6 flex flex-wrap gap-4 items-center justify-between">
                    <button class="px-5 py-2.5 bg-black text-white rounded-xl font-semibold text-sm hover:bg-gray-800 transition-colors shadow-sm" onclick="tambahProdukModal()">
                        + Tambah Produk
                    </button>
                </div>
                <div id="productsContainer" class="product-grid"></div>
            </div>

            <!-- Tab: Pesanan Masuk -->
            <div id="tabContentOrders" class="tab-panel">
                <div id="ordersContainer" class="orders-container"></div>
            </div>

            <!-- Tab: Pesanan Saya -->
            <div id="tabContentMyOrders" class="tab-panel">
                <div id="myOrdersContainer" class="orders-container"></div>
            </div>
        </div>

        <div class="btn-keluar-container">
            <button class="btn-keluar" onclick="prosesKeluar()">Keluar</button>
        </div>
    </div>

    <!-- Edit Profil Modal Dialog -->
    <div id="editProfilModal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <h3 class="font-serif text-lg font-bold">Edit Detail Profil</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Nama Lengkap</label>
                    <input type="text" id="editNameInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:border-zinc-950">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Pesan Saya (Bio)</label>
                    <textarea id="editBioInput" rows="2" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:border-zinc-950"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">No. Telepon</label>
                    <input type="text" id="editPhoneInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:border-zinc-950" placeholder="Contoh: 08123456789">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Alamat</label>
                    <textarea id="editAddressInput" rows="2" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:border-zinc-950" placeholder="Jl. ..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">URL Banner Profil</label>
                    <input type="text" id="editBannerInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:border-zinc-950" placeholder="https://...">
                </div>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closeEditProfilModal()" class="px-4 py-2 border border-zinc-200 rounded-lg text-sm font-semibold hover:bg-zinc-50">Batal</button>
                <button onclick="saveProfilDetails()" class="px-4 py-2 bg-black text-white rounded-lg text-sm font-semibold hover:bg-zinc-800">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Tambah Produk Modal Dialog -->
    <div id="tambahProdukModal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <h3 class="font-serif text-lg font-bold">Tambah Produk Baru</h3>
            <div class="space-y-3 overflow-y-auto max-h-[70vh] pr-1">
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Nama Produk</label>
                    <input type="text" id="prodNameInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Deskripsi Produk</label>
                    <textarea id="prodDescInput" rows="3" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none" placeholder="Tuliskan deskripsi produk..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Tag / Kategori</label>
                    <input type="text" id="prodTagInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none" placeholder="Contoh: buku, fiksi, novel">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">Harga (Rp)</label>
                    <input type="number" id="prodPriceInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-600 mb-1">URL Foto Produk</label>
                    <input type="text" id="prodPhotoInput" class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:outline-none" placeholder="https://...">
                </div>
            </div>
            <div class="flex gap-2 justify-end">
                <button onclick="closeTambahProdukModal()" class="px-4 py-2 border border-zinc-200 rounded-lg text-sm font-semibold hover:bg-zinc-50">Batal</button>
                <button onclick="saveNewProduct()" class="px-4 py-2 bg-black text-white rounded-lg text-sm font-semibold hover:bg-zinc-800">Tambahkan</button>
            </div>
        </div>
    </div>

    <div id="shopToast" class="toast-notif"><span id="toastMessage"></span></div>

    <script>
        let idUserAktif = null;
        let userProfilAktif = null;

        // Memvalidasi integritas library Supabase sebelum memanggil getSession
        async function periksaSesi() {
            try {
                console.log('periksaSesi: Memulai verifikasi sesi autentikasi...');
                
                if (!window.supabase) {
                    console.warn("Library Supabase belum sepenuhnya terinisialisasi. Menunggu...");
                    setTimeout(periksaSesi, 500);
                    return;
                }

                const { data: { session }, error: sessionError } = await window.supabase.auth.getSession();
                
                // Menutup skenario jika user tidak terautentikasi / mengalami error session
                if (sessionError || !session || !session.user) {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    tampilkanToast("Akses ditolak. Silakan masuk terlebih dahulu.", "#dc2626");
                    setTimeout(() => {
                        window.location.href = "auth.html";
                    }, 1200);
                    return;
                }
                
                idUserAktif = session.user.id;
                console.log('periksaSesi: Sesi terverifikasi sah. ID Pengguna:', idUserAktif);
                
                await muatDataProfil();
                await muatProdukToko();
                
                document.getElementById('loadingScreen').classList.add('hidden');
            } catch (error) {
                console.error("Error saat periksaSesi:", error);
                document.getElementById('loadingScreen').classList.add('hidden');
                tampilkanToast("Terjadi kesalahan sistem. Mengarahkan kembali...", "#dc2626");
                setTimeout(() => {
                    window.location.href = "auth.html";
                }, 1500);
            }
        }

        async function muatDataProfil() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', idUserAktif)
                .single();

            if (error) {
                console.error("Gagal memuat profil:", error);
                return;
            }

            userProfilAktif = data;
            document.getElementById('profileName').innerText = data.name || 'User Baru';
            document.getElementById('profileBio').innerText = data.message || 'Selamat datang di profil saya! Silakan jelajahi toko saya di bawah untuk melihat rilis produk terbaru kami.';
            
            document.getElementById('statFollowers').innerText = (data.followers !== undefined && data.followers !== null) ? data.followers : 0;
            document.getElementById('statFollowing').innerText = (data.following !== undefined && data.following !== null) ? data.following : 0;

            // Tampilkan info kontak dari kolom DB
            document.getElementById('profileEmail').innerText = data.email || '-';
            document.getElementById('profilePhone').innerText = data.phone || '-';
            document.getElementById('profileAddress').innerText = data.address || '-';

            // Banner URL
            if (data.banner_url) {
                const bannerEl = document.getElementById('profileBanner');
                if (bannerEl) {
                    bannerEl.style.backgroundImage = "url('" + data.banner_url + "')";
                    bannerEl.style.backgroundSize = 'cover';
                    bannerEl.style.backgroundPosition = 'center';
                    bannerEl.style.backgroundColor = 'transparent';
                }
            }

            if (data.avatar_url) {
                document.getElementById('profileAvatar').src = data.avatar_url;
            }
        }

        async function muatProdukToko() {
            const { data: produk, error } = await supabase
                .from('products')
                .select('*')
                .eq('user_id', idUserAktif)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Gagal memuat produk:", error);
                return;
            }

            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            if (produk.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 italic py-8">Anda belum memiliki produk. Mulai buat sekarang!</p>';
                return;
            }

            produk.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card-item';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${p.photo_url || 'https://placehold.co/280x200'}" alt="${p.name}">
                    </div>
                    <div class="product-info">
                        ${p.tag ? `<span style="display:inline-block;background:#f0f0f0;color:#555;font-size:10px;font-weight:700;padding:2px 10px;border-radius:9999px;margin-bottom:8px;letter-spacing:0.05em;">${p.tag}</span>` : ''}
                        <div class="product-name">${p.name}</div>
                        ${p.description ? `<div style="font-size:12px;color:#777;margin-bottom:8px;line-height:1.5;">${p.description}</div>` : ''}
                        <div class="product-price">${formatRupiah(p.price)}</div>
                        <div class="product-actions">
                            <button class="btn-small" onclick="editProduk('${p.id}')">Edit</button>
                            <button class="btn-small" onclick="hapusProduk('${p.id}')">Hapus</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function muatDaftarPesananPenjual() {
            const { data: pesanan, error: errorPesanan } = await supabase
                .from('orders')
                .select('*')
                .eq('seller_id', idUserAktif)
                .order('created_at', { ascending: false });

            if (errorPesanan) {
                console.error("Gagal mengambil pesanan penjual:", errorPesanan);
                return;
            }

            const badge = document.getElementById('ordersBadge');
            const activePending = pesanan.filter(o => o.status === "Menunggu Konfirmasi").length;
            if (badge) {
                if (activePending > 0) {
                    badge.innerText = activePending;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }

            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';

            if (pesanan.length === 0) {
                container.innerHTML = '<p class="font-serif text-zinc-400 italic text-center py-6">Belum ada pesanan masuk dari pembeli.</p>';
                return;
            }

            for (const order of pesanan) {
                const { data: items } = await supabase
                    .from('order_items')
                    .select('*')
                    .eq('order_id', order.id);

                const { data: pembeli } = await supabase
                    .from('profiles')
                    .select('name')
                    .eq('id', order.buyer_id)
                    .single();

                const buyerName = pembeli ? pembeli.name : "Pembeli Komunitas";
                const isPending = order.status === "Menunggu Konfirmasi";

                let itemsHtml = '';
                if (items) {
                    itemsHtml = items.map(it => `
                        <div class="flex justify-between text-xs py-1.5 border-b border-zinc-100 last:border-0">
                            <span class="text-zinc-700">${it.product_name} <strong class="text-zinc-950 font-bold">x${it.qty}</strong></span>
                            <span class="font-bold text-zinc-900">${formatRupiah(it.price * it.qty)}</span>
                        </div>
                    `).join('');
                }

                const card = document.createElement('div');
                card.className = "border border-zinc-200 p-5 rounded-2xl flex flex-col gap-4 bg-white shadow-xs";
                const tanggal = new Date(order.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});

                card.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div>
                            <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">${tanggal}</span>
                            <h5 class="text-sm font-bold text-zinc-950">ID Transaksi: ${order.id.slice(0, 8).toUpperCase()}</h5>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest ${
                            isPending 
                            ? 'bg-amber-100 text-amber-700' 
                            : 'bg-emerald-100 text-emerald-700'
                        }">
                            ${order.status}
                        </span>
                    </div>

                    <div class="bg-zinc-50 p-4 rounded-xl text-xs space-y-1.5 border border-zinc-100">
                        <div><strong class="text-zinc-800">Nama Penerima:</strong> ${buyerName}</div>
                        <div><strong class="text-zinc-800">No. Telepon:</strong> ${order.shipping_phone || '-'}</div>
                        <div><strong class="text-zinc-800">Alamat Tujuan:</strong> ${order.shipping_address || '-'}</div>
                    </div>

                    <div class="space-y-1">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider block">Ringkasan Produk</span>
                        <div class="bg-white border border-zinc-200/60 rounded-xl px-4 py-2">
                            ${itemsHtml}
                        </div>
                    </div>

                    <div class="flex items-center justify-between border-t border-zinc-100 pt-3 mt-1">
                        <div>
                            <span class="text-[10px] text-zinc-400 block">Total Pembayaran</span>
                            <span class="text-base font-serif font-bold text-zinc-950">${formatRupiah(order.total)}</span>
                        </div>
                        ${isPending ? `
                            <button onclick="prosesKonfirmasiPesanan('${order.id}')" class="px-5 py-2.5 bg-zinc-950 text-white rounded-xl text-xs font-bold hover:bg-zinc-800 transition shadow-md">
                                Konfirmasi & Kirim
                            </button>
                        ` : `
                            <span class="text-xs text-emerald-600 font-bold flex items-center gap-1">
                                Dikirim & Diproses
                            </span>
                        `}
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function prosesKonfirmasiPesanan(idPesanan) {
            const { error } = await supabase
                .from('orders')
                .update({ status: "Sedang Dikirim" })
                .eq('id', idPesanan);

            if (error) {
                tampilkanToast("Gagal melakukan konfirmasi pesanan: " + error.message, "#dc2626");
                return;
            }

            tampilkanToast("Pesanan berhasil diproses & sedang dikirim!", "#10b981");
            await muatDaftarPesananPenjual();
        }

        async function muatDaftarBelanjaanSaya() {
            const { data: pesanan, error: errorPesanan } = await supabase
                .from('orders')
                .select('*')
                .eq('buyer_id', idUserAktif)
                .order('created_at', { ascending: false });

            if (errorPesanan) {
                console.error("Gagal mengambil riwayat belanjaan:", errorPesanan);
                return;
            }

            const activePurchases = pesanan.filter(o => o.status !== "Selesai").length;
            const badge = document.getElementById('myOrdersBadge');
            if (badge) {
                if (activePurchases > 0) {
                    badge.innerText = activePurchases;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }

            const container = document.getElementById('myOrdersContainer');
            container.innerHTML = '';

            if (pesanan.length === 0) {
                container.innerHTML = '<p class="font-serif text-zinc-400 italic text-center py-6">Anda belum memiliki riwayat pembelian produk apapun.</p>';
                return;
            }

            for (const order of pesanan) {
                const { data: items } = await supabase
                    .from('order_items')
                    .select('*')
                    .eq('order_id', order.id);

                const { data: penjual } = await supabase
                    .from('profiles')
                    .select('name')
                    .eq('id', order.seller_id)
                    .single();

                const shopName = penjual ? penjual.name : "Toko Komunitas";
                const isPending = order.status === "Menunggu Konfirmasi";

                let itemsHtml = '';
                if (items) {
                    itemsHtml = items.map(it => `
                        <div class="flex justify-between text-xs py-1.5 border-b border-zinc-100 last:border-0">
                            <span class="text-zinc-700">${it.product_name} <strong class="text-zinc-950 font-bold">x${it.qty}</strong></span>
                            <span class="font-bold text-zinc-900">${formatRupiah(it.price * it.qty)}</span>
                        </div>
                    `).join('');
                }

                const card = document.createElement('div');
                card.className = "border border-zinc-200 p-5 rounded-2xl flex flex-col gap-4 bg-white shadow-xs";
                const tanggal = new Date(order.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});

                card.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div>
                            <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">${tanggal}</span>
                            <h5 class="text-sm font-bold text-zinc-950">ID Transaksi: ${order.id.slice(0, 8).toUpperCase()}</h5>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest ${
                            isPending 
                            ? 'bg-amber-100 text-amber-700' 
                            : 'bg-indigo-100 text-indigo-700'
                        }">
                            ${order.status}
                        </span>
                    </div>

                    <div class="bg-zinc-50 p-4 rounded-xl text-xs space-y-1.5 border border-zinc-100">
                        <div><strong class="text-zinc-800">Nama Toko:</strong> ${shopName}</div>
                        <div><strong class="text-zinc-800">Alamat Pengiriman Anda:</strong> ${order.shipping_address || '-'}</div>
                    </div>

                    <div class="space-y-1">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider block">Daftar Barang Belanja</span>
                        <div class="bg-white border border-zinc-200/60 rounded-xl px-4 py-2">
                            ${itemsHtml}
                        </div>
                    </div>

                    <div class="flex items-center justify-between border-t border-zinc-100 pt-3 mt-1">
                        <div>
                            <span class="text-[10px] text-zinc-400 block">Total Belanjaan</span>
                            <span class="text-base font-serif font-bold text-zinc-950">${formatRupiah(order.total)}</span>
                        </div>
                        <span class="text-xs text-zinc-500 italic">
                            Metode pembayaran: SandyPay
                        </span>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function pindahTabToko(tabName) {
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            if (tabName === 'products') {
                document.getElementById('tabContentProducts').classList.add('active');
                document.getElementById('btnTabProducts').classList.add('active');
            } else if (tabName === 'orders') {
                document.getElementById('tabContentOrders').classList.add('active');
                document.getElementById('btnTabOrders').classList.add('active');
                muatDaftarPesananPenjual();
            } else if (tabName === 'my-orders') {
                document.getElementById('tabContentMyOrders').classList.add('active');
                document.getElementById('btnTabMyOrders').classList.add('active');
                muatDaftarBelanjaanSaya();
            }
        }

        async function prosesKeluar() {
            const { error } = await supabase.auth.signOut();
            if (error) {
                tampilkanToast("Keluar gagal: " + error.message, "#dc2626");
                return;
            }
            tampilkanToast("Berhasil keluar...", "#dc2626");
            setTimeout(() => {
                window.location.href = "auth.html";
            }, 1000);
        }

        function editProfilModal() {
            if (!userProfilAktif) return;
            document.getElementById('editNameInput').value = userProfilAktif.name || '';
            document.getElementById('editBioInput').value = userProfilAktif.message || '';
            document.getElementById('editPhoneInput').value = userProfilAktif.phone || '';
            document.getElementById('editAddressInput').value = userProfilAktif.address || '';
            document.getElementById('editBannerInput').value = userProfilAktif.banner_url || '';
            document.getElementById('editProfilModal').classList.remove('hidden');
        }

        function closeEditProfilModal() {
            document.getElementById('editProfilModal').classList.add('hidden');
        }

        async function saveProfilDetails() {
            const newName = document.getElementById('editNameInput').value.trim();
            const newBio = document.getElementById('editBioInput').value.trim();

            if (!newName) {
                tampilkanToast("Nama tidak boleh kosong!", "#ef4444");
                return;
            }

            const newPhone = document.getElementById('editPhoneInput').value.trim();
            const newAddress = document.getElementById('editAddressInput').value.trim();
            const newBanner = document.getElementById('editBannerInput').value.trim();

            const { error } = await supabase
                .from('profiles')
                .update({ name: newName, message: newBio, phone: newPhone, address: newAddress, banner_url: newBanner })
                .eq('id', idUserAktif);

            if (error) {
                tampilkanToast("Gagal menyimpan profil: " + error.message, "#ef4444");
                return;
            }

            tampilkanToast("Profil berhasil diperbarui!", "#10b981");
            closeEditProfilModal();
            await muatDataProfil();
        }

        function editAvatarPrompt() {
            const newUrl = prompt("Masukkan URL foto profil yang baru:", userProfilAktif ? userProfilAktif.avatar_url || '' : '');
            if (newUrl !== null) {
                saveAvatarUrl(newUrl);
            }
        }

        async function saveAvatarUrl(url) {
            const { error } = await supabase
                .from('profiles')
                .update({ avatar_url: url })
                .eq('id', idUserAktif);

            if (error) {
                tampilkanToast("Gagal mengubah foto profil", "#ef4444");
                return;
            }

            tampilkanToast("Foto profil berhasil diubah!", "#10b981");
            await muatDataProfil();
        }

        function tambahProdukModal() {
            document.getElementById('prodNameInput').value = '';
            document.getElementById('prodDescInput').value = '';
            document.getElementById('prodTagInput').value = '';
            document.getElementById('prodPriceInput').value = '';
            document.getElementById('prodPhotoInput').value = '';
            document.getElementById('tambahProdukModal').classList.remove('hidden');
        }

        function closeTambahProdukModal() {
            document.getElementById('tambahProdukModal').classList.add('hidden');
        }

        async function saveNewProduct() {
            const name = document.getElementById('prodNameInput').value.trim();
            const price = parseFloat(document.getElementById('prodPriceInput').value);
            const photoUrl = document.getElementById('prodPhotoInput').value.trim();

            if (!name || isNaN(price) || price <= 0) {
                tampilkanToast("Lengkapi nama produk dan harga dengan benar!", "#ef4444");
                return;
            }

            const description = document.getElementById('prodDescInput').value.trim();
            const tag = document.getElementById('prodTagInput').value.trim();

            const { error } = await supabase
                .from('products')
                .insert([{
                    name: name,
                    description: description,
                    tag: tag,
                    price: price,
                    photo_url: photoUrl,
                    user_id: idUserAktif
                }]);

            if (error) {
                tampilkanToast("Gagal menambahkan produk: " + error.message, "#ef4444");
                return;
            }

            tampilkanToast("Produk berhasil ditambahkan!", "#10b981");
            closeTambahProdukModal();
            await muatProdukToko();
        }

        function editProduk(id) {
            tampilkanToast("Fitur edit produk sedang dikembangkan", "#4285F4");
        }

        async function hapusProduk(id) {
            if (!confirm("Hapus produk ini?")) return;
            const { error } = await supabase
                .from('products')
                .delete()
                .eq('id', id);
            
            if (error) {
                tampilkanToast("Gagal menghapus produk", "#dc2626");
                return;
            }
            tampilkanToast("Produk berhasil dihapus", "#10b981");
            await muatProdukToko();
        }

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function tampilkanToast(message, colorHex) {
            const toast = document.getElementById('shopToast');
            const toastMsg = document.getElementById('toastMessage');
            if (toast && toastMsg) {
                toastMsg.innerText = message;
                toast.style.borderColor = colorHex || '#fff';
                toast.style.display = 'flex';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            periksaSesi();
        });
    </script>
</body>
</html>
